<style>
  * {

body {
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  background-color: #000;
/*  height: 100vh;*/
  color: #fff;

  padding: 0;

/* header, main, footer */
  /*grid-template-rows: auto 1fr auto; 
  display: grid;*/
}

.page-wrapper {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.main {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;

  padding: 50px 10px;  /* Adjust top/bottom spacing as needed */
  box-sizing: border-box;
}

.container{
  width:200px;
  height: 200px;
  display: grid;
  grid-template-rows:1fr 1fr;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.item{
  width:100px;
  height: 100px;
  background-color: #000;
  border:2px solid red;
  box-sizing:border-box;
  border-radius:40px;
  cursor:pointer;
  color: #fff;
  display: flex;
  align-items:center;
  justify-content:center;
  position: relative;  
  z-index: 1; 
}
/* .item:hover{
  background-color: #fff;
} */
.item::after {
  content: "";
  display: block;
  position: absolute;
  top: 5%;
  left: 5%;
  width: 90%;
  height: 90%;
  border-radius: 35px;
  z-index: -1;
  box-shadow: 0 0 10px 5px currentColor;
}

.item:nth-child(1),.item:nth-child(1)::after{
  border-bottom-right-radius:0;
  border-top-left-radius:0;
  border: 1px solid #06f88b;
  color: #06f88b;
}

.item:nth-child(2),.item:nth-child(2)::after {
  border-bottom-left-radius:0;
  border-top-right-radius:0;
  border:1px solid #00fcff;
  color: #00fcff;
}

.item:nth-child(3),.item:nth-child(3)::after{
  border-top-right-radius:0;
  border-bottom-left-radius:0;
  border:1px solid #6500ff;
  color: #6500ff;
}

.item:nth-child(4),.item:nth-child(4)::after{
  border-top-left-radius:0;
  border-bottom-right-radius:0;
  border:1px solid #ff00b9;
  color: #ff00b9;
}

.item:hover{
  transform: scale(1.02);
  transition: transform 0.6s ease;
}

.item:nth-child(1):hover::after { 
  box-shadow: 0 0 20px 5px #06f88b; 
  transition: box-shadow 0.3s ease;
}
.item:nth-child(2):hover::after { 
  box-shadow: 0 0 20px 5px #00fcff; 
  transition: box-shadow 0.3s ease;
}
.item:nth-child(3):hover::after { 
  box-shadow: 0 0 20px 5px #6500ff; 
  transition: box-shadow 0.3s ease;
}
.item:nth-child(4):hover::after { 
  box-shadow: 0 0 20px 5px #ff00b9; 
  transition: box-shadow 0.3s ease;
}
.item:hover {
  text-shadow: 0 0 8px currentColor;
}
.item::before {
  content: "";
  position: absolute;
  top: -20px;
  left: -20px;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  background: currentColor;
  opacity: 0;
  filter: blur(25px);
  transition: opacity 0.4s ease;
  z-index: 0;
}

.item:hover::before {
  opacity: 0.2;
}
.item a {
  color: inherit;
  text-decoration: none;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100%;
  width: 100%;
  text-align: center;
  pointer-events: auto;
  z-index: 2;
  position: relative;
}

.item::before,
.item::after {
  pointer-events: none;
}

}

*/

    .dropdown {

/*    .dropdown-content {

    .dropdown-content {
  display: none;
  flex-direction: column;

  border: 1px solid #444;
  border-radius: 10px;
  padding: 5px;
  margin-top: 5px;
  box-shadow: 0 0 10px #00fcff33;
}

    .dropdown:hover .dropdown-content {
      display: flex;
    }

    /* Optional: hamburger active animation */
    
    .hamburger.active span:nth-child(1) {
      transform: rotate(45deg) translateY(8px);
    }

    .hamburger.active span:nth-child(2) {
      opacity: 0;
    }

    .hamburger.active span:nth-child(3) {
      transform: rotate(-45deg) translateY(-8px);
    }
